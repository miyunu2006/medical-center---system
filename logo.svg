<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="medGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Clinical Cross Symbol -->
  <path d="M40 30 h20 v-20 a8 8 0 0 1 16 0 v20 h20 a8 8 0 0 1 0 16 h-20 v20 a8 8 0 0 1 -16 0 v-20 h-20 a8 8 0 0 1 0 -16 z" fill="url(#medGrad)" />
  
  <!-- Embedded Pulse/Surgery Line Inside Cross -->
  <path d="M45 38 l6 0 l5 -11 l9 24 l11 -16 l5 3" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Soft Accent Leaf of Healing -->
  <path d="M85 58 C 98 58, 98 76, 85 76 C 72 76, 72 58, 85 58" fill="#90e0ef" opacity="0.75"/>
  
  <!-- Visual Text Architecture -->
  <text x="125" y="52" font-family="'Segoe UI', Poppins, sans-serif" font-size="26" font-weight="800" fill="#0077b6" letter-spacing="1">WOUND CARE <tspan fill="#e63946">&amp;</tspan></text>
  <text x="125" y="82" font-family="'Segoe UI', Poppins, sans-serif" font-size="21" font-weight="600" fill="#2b2d42" letter-spacing="2">MEDICAL CENTER</text>
  <text x="125" y="103" font-family="'Segoe UI', Poppins, sans-serif" font-size="11" font-weight="500" fill="#6c757d" letter-spacing="3">DISPENSARY &amp; SURGERY</text>
</svg>